name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v3
        with:
          repository: Swordfish90/Lemuroid
          ref: refs/pull/1115/head
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleFreeDynamicDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lemuroid-apk
          path: lemuroid-app/build/outputs/apk/freeDynamic/debug/*.apk
